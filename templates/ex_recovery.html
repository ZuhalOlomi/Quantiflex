<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Recovery Plan | QuantiFlex</title>
    <link rel="stylesheet" href="../static/style.css">
    <style>
        body {
            font-family: "Georgia", serif;
            background: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 0;
            animation: fadeIn 0.8s ease-out;
        }

        /* ── Hero banner ── */
        .recovery-hero {
            text-align: center;
            padding: 2.5rem 1.5rem;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-bottom: 1px solid #dce3ea;
        }

        .recovery-hero h2 {
            font-size: 2.2rem;
            color: #2c3e50;
            margin: 0 0 0.4rem;
            font-family: "Georgia", serif;
        }

        .recovery-hero p {
            color: #666;
            font-size: 1.05rem;
            margin: 0;
            padding: 0;
        }

        /* ── Main content area ── */
        .recovery-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px 80px;
        }

        /* ── Exercise card ── */
        .exercise-card {
            background: white;
            padding: 0;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.08);
            margin-bottom: 28px;
            border: 1px solid #e0e0e0;
            overflow: hidden;
            display: flex;
            gap: 0;
            align-items: stretch;
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }

        .exercise-card:hover {
            box-shadow: 0 8px 20px rgba(77, 130, 173, 0.15);
            transform: translateY(-2px);
        }

        /* Vertical image strip on the left */
        .exercise-thumb {
            width: 180px;
            flex-shrink: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #e8f4fd, #d5e8f5);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .exercise-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .exercise-thumb-fallback {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #4d82ad;
            padding: 20px;
            text-align: center;
        }

        .exercise-thumb-fallback span {
            font-size: 3rem;
            margin-bottom: 8px;
        }

        .exercise-thumb-fallback small {
            font-size: 0.75rem;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Right content area */
        .exercise-info {
            flex: 1;
            padding: 24px 28px;
        }

        .exercise-info h3 {
            color: #2c3e50;
            margin: 0 0 12px;
            font-size: 1.5rem;
            font-family: "Georgia", serif;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }

        /* Badge row */
        .meta-container {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .badge {
            background: #ddeef8;
            color: #2c5f82;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.83rem;
            font-weight: 700;
            font-family: "Georgia", serif;
        }

        /* Instructions */
        .exercise-directions {
            margin-bottom: 16px;
            line-height: 1.7;
            font-size: 0.96rem;
            color: #444;
        }

        .exercise-directions strong {
            display: block;
            color: #2c3e50;
            margin-bottom: 4px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Tip box */
        .exercise-tips {
            background: #fffbeb;
            padding: 12px 16px;
            border-left: 4px solid #f59e0b;
            border-radius: 0 8px 8px 0;
            font-size: 0.9rem;
            color: #78350f;
            margin-bottom: 18px;
            font-family: "Georgia", serif;
        }

        .exercise-tips strong {
            font-size: 0.85rem;
        }

        /* Video embed */
        .video-wrapper {
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            aspect-ratio: 16 / 9;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.12);
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ── Chat bubble ── */
        #chat-toggle {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 60px;
            height: 60px;
            background: #4d82ad;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(77, 130, 173, 0.4);
            z-index: 1001;
            font-size: 1.8rem;
            transition: all 0.3s ease;
        }

        #chat-toggle:hover {
            background: #3a6788;
            transform: scale(1.08);
        }

        /* ── Chat container ── */
        #chat-container {
            position: fixed;
            bottom: 100px;
            right: 28px;
            width: 340px;
            height: 440px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            display: none;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e0e0e0;
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
        }

        #chat-header {
            background: #4d82ad;
            color: white;
            padding: 16px 18px;
            font-weight: bold;
            font-family: "Georgia", serif;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat-header span {
            cursor: pointer;
            font-size: 1.3rem;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        #chat-header span:hover { opacity: 1; }

        #chat-messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            background: #f8f9fa;
            font-size: 14px;
            line-height: 1.6;
        }

        .chat-msg {
            background: white;
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 10px;
            border: 1px solid #e0e0e0;
            color: #2c3e50;
        }

        #chat-input-area {
            padding: 14px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 8px;
            background: white;
        }

        #chat-input {
            flex: 1;
            padding: 9px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: "Georgia", serif;
            font-size: 13px;
            transition: border-color 0.3s ease;
        }

        #chat-input:focus {
            outline: none;
            border-color: #4d82ad;
        }

        #send-btn {
            background: #4d82ad;
            color: white;
            border: none;
            padding: 9px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: "Georgia", serif;
            font-weight: 600;
            font-size: 13px;
            transition: background 0.2s ease;
        }

        #send-btn:hover { background: #3a6788; }

        /* ── Loading state ── */
        .loading-msg {
            text-align: center;
            color: #7f8c8d;
            padding: 40px 20px;
            font-size: 1rem;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .exercise-card {
                flex-direction: column;
            }

            .exercise-thumb {
                width: 100%;
                height: 200px;
            }

            .exercise-info {
                padding: 20px;
            }

            #chat-container {
                width: calc(100vw - 40px);
                right: 20px;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>QuantiFlex</h1>
        <nav>
            <ul>
                <li><a href="patient_home.html">Dashboard</a></li>
                <li><a href="patient_analysis.html">My Analysis</a></li>
                <li><a href="ex_recovery.html" class="active">Recovery Plan</a></li>
                <li><a href="demographics.html">My Profile</a></li>
            </ul>
        </nav>
    </header>

    <section class="recovery-hero">
        <h2>My Recovery Plan</h2>
        <p>Your personalised rehabilitation exercises assigned by your clinician</p>
    </section>

    <main class="recovery-container">
        <div id="exercises-container">
            <p class="loading-msg">Syncing your recovery plan…</p>
        </div>
    </main>

    <!-- Chat toggle button -->
    <div id="chat-toggle" onclick="toggleChat()" title="Clinician Support">💬</div>

    <!-- Chat window -->
    <div id="chat-container">
        <div id="chat-header">
            Clinician Support
            <span onclick="toggleChat()">×</span>
        </div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Type a message…" onkeydown="if(event.key==='Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <footer>
        <p>© 2025-2026 UTBiome | Clinical Rehabilitation Technology</p>
    </footer>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:5001';
        const PATIENT_ID   = 'p101';

        const FALLBACK_EXERCISES = [
            {
                name: 'Quad Sets',
                sets: 3, reps: 10,
                frequency: '3–4 times/day',
                directions: 'Sit or lie on your back with your leg straight on a flat surface. Tighten the muscle on top of your thigh (quadriceps) by pressing the back of your knee down into the floor or bed. Hold for 5 seconds, then relax completely.',
                tips: 'Breathe normally throughout. You should feel the muscle firm up but not feel pain. This can be done throughout the day while resting.',
                image: '/static/exercises/quad-sets.jpg',
                video: 'https://www.youtube.com/watch?v=9EhHFemc8WQ'
            },
            {
                name: 'Straight Leg Raises',
                sets: 3, reps: 10,
                frequency: '3 times/day',
                directions: 'Lie on your back. Bend the uninvolved knee with your foot flat on the floor. Tighten your quad on the involved leg (perform a quad set), then lift the straight leg to the height of the opposite bent knee — about 12 inches. Hold for 3 seconds, then slowly lower.',
                tips: 'Keep your knee completely straight throughout the entire lift and lowering phase. Do not let it bend.',
                image: '/static/exercises/straight-leg-raises.jpg',
                video: 'https://www.youtube.com/watch?v=4UBnTSqRlD0'
            },
            {
                name: 'Heel Slides',
                sets: 3, reps: 10,
                frequency: '3 times/day',
                directions: 'Lie on your back with both legs straight. Slowly slide your heel toward your buttock by bending the knee as far as comfortable. Hold for 5 seconds, then slowly slide back to the starting position.',
                tips: 'Keep your heel in contact with the surface at all times. Do not force the bend — work within a comfortable range and aim to increase it gradually each session.',
                image: '/static/exercises/heel-slides.jpg',
                video: 'https://www.youtube.com/watch?v=dPf8_MgS1aI'
            },
            {
                name: 'Short Arc Quads',
                sets: 3, reps: 10,
                frequency: '3 times/day',
                directions: 'Lie on your back. Place a rolled towel or firm bolster under your knee so it rests at approximately 60°. Tighten your quad and slowly lift your foot until the leg is fully straight. Hold for 5 seconds, then slowly lower.',
                tips: 'Keep your thigh resting on the bolster at all times — do not lift the thigh. Focus on achieving full, terminal knee extension at the top.',
                image: '/static/exercises/short-arc-quads.jpg',
                video: 'https://www.youtube.com/watch?v=3f1k1huhRgI'
            },
            {
                name: 'Ankle Pumps',
                sets: 3, reps: 20,
                frequency: '3–4 times/day',
                directions: 'Lie or sit with your leg straight. Slowly pull your toes up toward your shin as far as possible (dorsiflexion), hold 2 seconds, then point your toes downward (plantarflexion), hold 2 seconds. Alternate in a slow, rhythmic pattern.',
                tips: 'This exercise promotes circulation and helps reduce swelling. Perform it frequently — especially during the first several weeks after surgery or injury.',
                image: '/static/exercises/ankle-pumps.jpg',
                video: 'https://www.youtube.com/watch?v=O92TCCmEqbk'
            },
            {
                name: 'Prone Knee Flexion',
                sets: 3, reps: 10,
                frequency: '3 times/day',
                directions: 'Lie face down on a flat surface with your legs straight. Slowly bend your involved knee, bringing your heel toward your buttock as far as comfortable. Hold for 3 seconds, then slowly lower back to the starting position.',
                tips: 'Keep your hip flat against the surface throughout — do not allow it to rise as you bend the knee.',
                image: '/static/exercises/prone-knee-flexion.jpg',
                video: 'https://www.youtube.com/watch?v=_LP6X9J68H0'
            },
            {
                name: 'Terminal Knee Extension',
                sets: 3, reps: 15,
                frequency: '3 times/day',
                directions: 'Secure a resistance band to a fixed anchor at knee height. Loop the other end around the back of your involved knee. Face the anchor and start with the knee slightly bent. Tighten your quad and fully straighten the knee. Hold 2 seconds, then slowly return.',
                tips: 'Stand tall with your core engaged. Control the return movement — do not let the band snap your knee back into flexion.',
                image: '/static/exercises/terminal-knee-extension.jpg',
                video: 'https://www.youtube.com/watch?v=uUugNQxirt0'
            },
            {
                name: 'Standing Hip Abduction',
                sets: 3, reps: 10,
                frequency: '3 times/day',
                directions: 'Stand beside a wall or counter and hold it lightly for balance. Slowly lift your involved leg straight out to the side, keeping your toes pointing forward and your knee straight. Hold for 3 seconds, then slowly lower.',
                tips: 'Do not lean your trunk toward the standing leg. Keep your back straight and movements slow and controlled.',
                image: '/static/exercises/hip-abduction.jpg',
                video: 'https://www.youtube.com/watch?v=xUxWsvWj3Go'
            },
            {
                name: 'Heel Raises',
                sets: 3, reps: 10,
                frequency: '3 times/day',
                directions: 'Stand with feet hip-width apart, lightly holding a stable surface for balance. Rise up onto the balls of both feet as high as comfortable. Hold for 3 seconds, then slowly lower your heels back to the floor.',
                tips: 'Control the lowering phase — this eccentric portion builds significant calf strength. As you progress, your therapist may advance you to single-leg heel raises.',
                image: '/static/exercises/heel-raises.jpg',
                video: 'https://www.youtube.com/watch?v=cqDMYUaIXvw'
            },
            {
                name: 'Wall Squats',
                sets: 3, reps: 10,
                frequency: '3 times/week',
                directions: 'Stand with your back flat against a wall, feet shoulder-width apart and placed about 12 inches in front of the wall. Slowly slide down until your knees are bent at 45–60°. Hold for 5–10 seconds, then slide back up to standing.',
                tips: 'Do not allow your knees to bend past 90°. Keep knees aligned over your second toes and do not let them cave inward.',
                image: '/static/exercises/wall-squats.jpg',
                video: 'https://www.youtube.com/watch?v=3J99J5NxNSQ'
            },
            {
                name: 'Step-Ups',
                sets: 3, reps: 10,
                frequency: '3 times/week',
                directions: 'Stand in front of a 4–6 inch step. Step up with the involved leg and place your whole foot on the step. Bring the other foot up, then step back down with the uninvolved leg first. The involved leg should do the majority of the work.',
                tips: 'Keep your knee tracking over your second toe during the step. Use a handrail for balance if needed, especially early in rehabilitation.',
                image: '/static/exercises/step-ups.jpg',
                video: 'https://www.youtube.com/watch?v=xOcpKS8APxo'
            },
            {
                name: 'Hamstring Curls (Standing)',
                sets: 3, reps: 10,
                frequency: '3 times/week',
                directions: 'Stand holding a wall or counter for support. Slowly bend your involved knee, curling your heel toward your buttock as far as comfortable. Hold for 3 seconds, then slowly lower your foot back to the floor.',
                tips: 'Keep both thighs even and parallel — do not let the involved hip hike up as you curl. Increase range of motion gradually.',
                image: '/static/exercises/hamstring-curls.jpg',
                video: 'https://www.youtube.com/watch?v=zRL2TBKc2cc'
            }
        ];

        /* ── Helpers ── */
        function getYouTubeEmbedUrl(url) {
            if (!url) return null;
            let id = null;
            try {
                const u = new URL(url);
                id = u.hostname.includes('youtu.be') ? u.pathname.slice(1) : u.searchParams.get('v');
            } catch (e) { return null; }
            return id ? `https://www.youtube.com/embed/${id}` : null;
        }

        /* ── Render exercises ── */
        function renderExercises(exercises) {
            const container = document.getElementById('exercises-container');
            if (!exercises || exercises.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#7f8c8d; padding:40px 0;">No exercises assigned yet. Check back with your clinician.</p>';
                return;
            }

            container.innerHTML = exercises.map((ex, idx) => {
                const embedUrl = getYouTubeEmbedUrl(ex.video);
                return `
                <div class="exercise-card" style="animation-delay: ${idx * 0.07}s; animation: fadeIn 0.5s ease both;">
                    <div class="exercise-thumb">
                        <img src="${ex.image}"
                             alt="${ex.name}"
                             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <div class="exercise-thumb-fallback" style="display:none;">
                            <span>🏋️</span>
                            <small>Exercise</small>
                        </div>
                    </div>
                    <div class="exercise-info">
                        <h3>${ex.name}</h3>
                        <div class="meta-container">
                            <span class="badge">📋 ${ex.sets} Sets × ${ex.reps} Reps</span>
                            <span class="badge">🔁 ${ex.frequency}</span>
                        </div>
                        <div class="exercise-directions">
                            <strong>Instructions</strong>
                            ${ex.directions}
                        </div>
                        <div class="exercise-tips">
                            <strong>💡 Clinical Tip:</strong> ${ex.tips}
                        </div>
                        ${embedUrl ? `
                        <div class="video-wrapper">
                            <iframe src="${embedUrl}" frameborder="0" allowfullscreen loading="lazy"></iframe>
                        </div>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        /* ── Load plan from API or fallback ── */
        async function loadPlan() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/assignments/${PATIENT_ID}`);
                const data = await response.json();
                renderExercises(data.exercises && data.exercises.length > 0 ? data.exercises : FALLBACK_EXERCISES);
            } catch (err) {
                renderExercises(FALLBACK_EXERCISES);
            }
        }

        /* ── Chat ── */
        function toggleChat() {
            const c = document.getElementById('chat-container');
            const isOpen = c.style.display === 'flex';
            c.style.display = isOpen ? 'none' : 'flex';
            if (!isOpen) document.getElementById('chat-input').focus();
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text  = input.value.trim();
            if (!text) return;

            const msgs = document.getElementById('chat-messages');
            const msgEl = document.createElement('div');
            msgEl.className = 'chat-msg';
            msgEl.textContent = 'You: ' + text;
            msgs.appendChild(msgEl);
            msgs.scrollTop = msgs.scrollHeight;
            input.value = '';
        }

        document.addEventListener('DOMContentLoaded', loadPlan);
    </script>
</body>
</html>
