<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuantiFlex - Patient Dashboard</title>
    
    <script>
        (function() {
            const isLoggedIn = localStorage.getItem("loggedIn") === "true";
            const userRole = localStorage.getItem("userRole");
            if (!isLoggedIn || userRole !== "patient") {
                window.location.replace("login.html");
            }
        })();
    </script>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"></script>
    
    <style>
        .welcome-banner {
            background: #2c3e50;
            color: white;
            padding: 25px 35px;
            border-radius: 12px;
            margin: 20px auto;
            max-width: 1200px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border-left: 6px solid #4d82ad;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .welcome-banner h2 { margin: 0; font-size: 1.9rem; font-family: "Georgia", serif; }
        #userNameDisplay { color: #4d82ad; font-weight: bold; }

        .typing-container {
            margin-top: 8px;
            font-size: 1.15rem;
            min-height: 1.6em;
            color: #ecf0f1;
        }

        .cursor { display: inline-block; width: 2px; height: 1.2em; background-color: #4d82ad; margin-left: 5px; animation: blink 0.7s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .logout-btn {
            background: #4d82ad;
            color: white;
            padding: 10px 22px;
            border-radius: 8px;
            transition: all 0.3s;
            text-decoration: none;
            font-weight: 500;
        }

        .logout-btn:hover { background: #e74c3c; }

        .hero {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            overflow: hidden;
            background: #000;
            border-radius: 15px;
            margin: 0 20px;
        }

        #bgVideo {
            position: absolute;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            transform: translate(-50%, -50%);
            z-index: 0;
            object-fit: cover;
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 1;
        }

        .hero-text { 
            position: relative; 
            z-index: 2; 
            color: white; 
            text-align: center; 
            padding: 20px; 
            max-width: 800px;
        }

        .hero-text h2 { 
            color: white; 
            margin-bottom: 5px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-size: 2.2rem;
        }

        .hero-text h3 { 
            color: #4d82ad; 
            margin-bottom: 15px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-weight: 400;
        }

        .hero-text p { color: white; margin-bottom: 15px; letter-spacing: 1px; }

    </style>
</head>

<body>
    <header>
        <div class="nav-container">
            <h1 class="logo">QuantiFlex</h1>
            <nav>
                <ul>
                    <li><a href="patient_home.html" class="active">Dashboard</a></li>
                    <li><a href="patient_analysis.html">My Analysis</a></li>
                    <li><a href="demographics.html">My Profile</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="welcome-banner gs_reveal">
            <div>
                <h2>Welcome back, <span id="userNameDisplay">Patient</span>!</h2>
                <div class="typing-container">
                    <span id="typing-text"></span><span class="cursor"></span>
                </div>
            </div>
            <a href="logout.html" class="logout-btn" id="logoutBtn" style="text-decoration: none; display: inline-block; text-align: center;">Secure Logout</a>
        </section>

        <section class="hero video-hero">
            <video id="bgVideo" autoplay muted playsinline preload="auto">
<video src="{{ url_for('static', filename='knee_extension.mov') }}"></video>            </video>
            <div class="hero-overlay"></div>
            <div class="hero-text gs_reveal">
                <h2>Streamline Knee Rehabilitation</h2>
                <h3>Track Progress Visually</h3>
                <p style="text-align: center;"">Monitor your daily knee range of motion and stay on top of your rehabilitation goals.</p>
                <div class="cta-buttons" style="margin-top: 25px; display: flex; justify-content: center; gap: 15px;">
                    <a href="patient_analysis.html" class="btn-primary">Start Session</a>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            gsap.registerPlugin(ScrollTrigger);

            // 1. DYNAMIC NAME INJECTION (Updated to pull from demographics object)
            function loadPatientName() {
                const savedProfile = localStorage.getItem('patientProfile');
                const nameDisplay = document.getElementById('userNameDisplay');
                
                if (savedProfile) {
                    try {
                        const profile = JSON.parse(savedProfile);
                        if (profile.firstName) {
                            nameDisplay.textContent = profile.firstName;
                        }
                    } catch (e) {
                        console.error('Error loading name:', e);
                    }
                }
            }
            loadPatientName();

            // 2. PATIENT TYPEWRITER
            const typingText = document.getElementById('typing-text');
            const phrases = [
                "Consistency is key to recovery!",
                "Ready for today's session?",
                "Your progress is impressive!",
                "Keep up the great work!",
                "Every rep counts towards healing!"
            ];

            let pIdx = 0, cIdx = 0, deleting = false;
            function type() {
                const current = phrases[pIdx];
                typingText.textContent = deleting ? current.substring(0, cIdx--) : current.substring(0, cIdx++);
                if (!deleting && cIdx > current.length) { deleting = true; setTimeout(type, 2000); }
                else if (deleting && cIdx === 0) { deleting = false; pIdx = (pIdx + 1) % phrases.length; setTimeout(type, 500); }
                else { setTimeout(type, deleting ? 40 : 80); }
            }
            type();

            // 3. VIDEO LOOP (4 SECONDS)
            const video = document.getElementById('bgVideo');
            if (video) {
                video.addEventListener('timeupdate', function () {
                    if (this.currentTime >= 4) { this.currentTime = 0; this.play(); }
                });
            }

            // 4. GSAP REVEALS
            gsap.utils.toArray(".gs_reveal").forEach(elem => {
                gsap.fromTo(elem, { autoAlpha: 0, y: 30 }, {
                    duration: 1, y: 0, autoAlpha: 1, ease: "power2.out",
                    scrollTrigger: { trigger: elem, start: "top 90%" }
                });
            });
        });
    </script>
</body>
</html>
