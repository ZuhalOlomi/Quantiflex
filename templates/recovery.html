<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovery Plan | QuantiFlex</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head>

<body>
    <header>
        <h1>QuantiFlex</h1>
        <nav>
            <ul>
                <li><a href="/index">Home</a></li>
                <li><a href="/about">About</a></li>
                <li><a href="/analysis">Analysis</a></li>
                <li><a href="/recovery">Recovery</a></li>
                <li><a href="/video">Video Demo</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <div class="gs_reveal_fromLeft contact-box">
                <h2>Assign Recovery Plan</h2>
                <p style="padding: 0; margin-bottom: 20px; color: #666; text-align: center;">Manage and assign exercise
                    routines for patient rehabilitation</p>

                <div class="patient-selector" style="margin-bottom: 20px;">
                    <label for="current-patient">Select Patient</label>
                    <select id="current-patient"
                        style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #999; font-family: 'Georgia', serif;">
                        <option value="p101">John Doe (ACL Recovery)</option>
                        <option value="p102">Jane Smith (Knee Replacement)</option>
                    </select>
                </div>

                <div class="exercise-grid" style="display: grid; grid-template-columns: 1fr; gap: 20px;">
                    <div class="ex-card" data-ex="quad-sets"
                        style="background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e1e8ed; text-align: center;">
                        <img src="quad-set-thumb.jpg" alt="Quad Sets"
                            style="max-width: 100%; border-radius: 5px; margin-bottom: 10px;">
                        <h3 style="color: #4d82ad; margin-bottom: 15px;">Quad Sets</h3>
                        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                            <input type="number" placeholder="Sets" id="sets-qs"
                                style="flex: 1; padding: 10px; border: 1px solid #999; border-radius: 5px;">
                            <input type="number" placeholder="Reps" id="reps-qs"
                                style="flex: 1; padding: 10px; border: 1px solid #999; border-radius: 5px;">
                        </div>
                        <button onclick="assignExercise('quad-sets')"
                            style="width: 100%; background: #4d82ad; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-family: 'Georgia', serif;">Add
                            to Plan</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2025-2026 UTBiome | Clinical Rehabilitation Technology</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        function animateFrom(elem, direction) {
            direction = direction || 1;
            var x = 0, y = direction * 100;
            if (elem.classList.contains("gs_reveal_fromLeft")) { x = -100; y = 0; }
            else if (elem.classList.contains("gs_reveal_fromRight")) { x = 100; y = 0; }
            elem.style.transform = `translate(${x}px, ${y}px)`;
            elem.style.opacity = "0";
            gsap.fromTo(elem, { x, y, autoAlpha: 0 }, {
                duration: 1.25, x: 0, y: 0, autoAlpha: 1, ease: "expo", overwrite: "auto"
            });
        }

        function hide(elem) {
            gsap.set(elem, { autoAlpha: 0 });
        }

        document.addEventListener("DOMContentLoaded", function () {
            gsap.registerPlugin(ScrollTrigger);
            gsap.utils.toArray(".gs_reveal_fromLeft").forEach(function (elem) {
                hide(elem);
                ScrollTrigger.create({
                    trigger: elem,
                    onEnter: function () { animateFrom(elem) },
                    onEnterBack: function () { animateFrom(elem, -1) },
                    onLeave: function () { hide(elem) }
                });
            });
        });

        function assignExercise(exId) {
            const sets = document.getElementById(`sets-qs`).value;
            const reps = document.getElementById(`reps-qs`).value;
            if (sets && reps) {
                alert(`Exercise ${exId} assigned: ${sets} sets of ${reps} reps.`);
            } else {
                alert('Please enter sets and reps.');
            }
        }
    </script>
</body>

</html>
