<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out | UTBiome</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .logout-box {
            text-align: center;
            padding: 100px 20px;
            max-width: 500px;
            margin: 50px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .timer-text { color: #888; margin-top: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <header>
        <h1>Quantiflex</h1>
    </header>

    <main>
        <div class="logout-box">
            <h2 style="color: #333;">Successfully Logged Out</h2>
            <p>Your secure session has ended. Thank you for using Quantiflex! </p>
        
            <div style="margin-top: 30px;">
                <a href="login.html" class="toggle-btn active" style="text-decoration: none; padding: 12px 25px; display: inline-block; background-color: #007bff; color: white; border-radius: 5px;">
                    Log Back In
                </a>
            </div>
            
            <p class="timer-text">Redirecting to home in <span id="count">5</span> seconds...</p>
        </div>
    </main>

    <script>
        let timeLeft = 5;
        const countElement = document.getElementById('count');
        
        // Auto-redirect to main screen after 5 seconds
        const timer = setInterval(() => {
            timeLeft--;
            countElement.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
                window.location.href = "index.html";

            }
        }, 1000);
    </script>
</body>
</html>
