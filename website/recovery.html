<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Recovery Plan | QuantiFlex</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .exercise-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
            border: 1px solid #e1e8ed;
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .exercise-image {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            background: #f1f5f9;
        }

        .exercise-info {
            flex: 1;
        }

        .exercise-info h3 {
            color: #4d82ad;
            margin-top: 0;
            margin-bottom: 10px;
        }

        .exercise-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-weight: bold;
            color: #2c3e50;
        }

        .exercise-tips {
            background: #fff9db;
            padding: 10px 15px;
            border-left: 4px solid #fcc419;
            border-radius: 4px;
            font-size: 0.95rem;
            color: #495057;
        }

        /* Chat component styles */
        #chat-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 350px;
            height: 450px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e1e8ed;
            z-index: 1000;
            display: none;
            /* Hidden by default */
        }

        #chat-header {
            background: #4d82ad;
            color: white;
            padding: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #f8fafc;
        }

        .message.patient {
            background: #4d82ad;
            color: white;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 2px;
        }

        .message.clinician {
            background: #ffffff;
            color: #333;
            align-self: flex-start;
            border: 1px solid #e1e8ed;
            border-bottom-left-radius: 2px;
        }

        #chat-toggle {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            background: #4d82ad;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            z-index: 1001;
            font-size: 1.8rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #chat-toggle:hover {
            transform: scale(1.1) rotate(5deg);
        }

        /* Message bubble refined styles - Patient View */
        .message {
            margin-bottom: 12px;
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.4;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #chat-input-area {
            padding: 15px;
            border-top: 1px solid #e1e8ed;
            display: flex;
            gap: 10px;
        }

        #chat-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            outline: none;
        }

        #send-btn {
            background: #4d82ad;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .exercise-card {
                flex-direction: column;
            }

            .exercise-image {
                width: 100%;
                height: 200px;
            }

            #chat-container {
                width: 90%;
                left: 5%;
                right: 5%;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>QuantiFlex</h1>
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="analysis.html">My Progress</a></li>
                <li><a href="recovery.html" class="active">Recovery Plan</a></li>
            </ul>
        </nav>
    </header>

    <main style="max-width: 1000px; margin: 0 auto; padding: 40px 20px;">
        <h2 style="text-align: center; margin-bottom: 40px; color: #2c3e50;">Active Rehabilitation Plan</h2>

        <div id="exercises-container">
            <!-- Exercises will be loaded here -->
            <p style="text-align: center; color: #666;">Loading your exercises...</p>
        </div>

        <!-- Chat Box -->
        <div id="chat-toggle" onclick="toggleChat()">
            <span>💬</span>
        </div>

        <div id="chat-container">
            <div id="chat-header">
                Chat with Clinician
                <span style="font-size: 1.2rem; cursor: pointer;" onclick="toggleChat()">×</span>
            </div>
            <div id="chat-messages">
                <!-- Messages will be loaded here -->
            </div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type a message...">
                <button id="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2025-2026 Quantiflex | Clinical Rehabilitation Technology</p>
    </footer>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:5001';
        const PATIENT_ID = 'p101'; // Mocking current patient ID

        async function loadPlan() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/assignments/${PATIENT_ID}`);
                const data = await response.json();
                renderExercises(data.exercises || []);
            } catch (err) {
                console.error("Error loading plan:", err);
                document.getElementById('exercises-container').innerHTML = '<p style="text-align: center; color: red;">Failed to load plan. Is the backend running?</p>';
            }
        }

        function renderExercises(exercises) {
            const container = document.getElementById('exercises-container');
            if (exercises.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #666;">No exercises assigned yet.</p>';
                return;
            }

            container.innerHTML = exercises.map(ex => `
                <div class="exercise-card">
                    <img src="${ex.image || 'quad-set-thumb.jpg'}" alt="${ex.name}" class="exercise-image" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                    <div class="exercise-info">
                        <h3>${ex.name}</h3>
                        <div class="exercise-meta">
                            <span>Sets: ${ex.sets}</span>
                            <span>Reps: ${ex.reps}</span>
                        </div>
                        <div class="exercise-tips">
                            <strong>Tip:</strong> ${ex.tips || 'Follow the instructions provided by your clinician.'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Chat logic
        async function loadMessages() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/messages/${PATIENT_ID}`);
                const messages = await response.json();
                const container = document.getElementById('chat-messages');
                container.innerHTML = messages.map(msg => `
                    <div class="message ${msg.sender}">
                        ${msg.text}
                    </div>
                `).join('');
                container.scrollTop = container.scrollHeight;
            } catch (err) {
                console.error("Error loading messages:", err);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            try {
                const response = await fetch(`${API_BASE_URL}/api/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        patientId: PATIENT_ID,
                        sender: 'patient',
                        text: text,
                        timestamp: new Date().toISOString()
                    })
                });
                const result = await response.json();
                if (result.success) {
                    input.value = '';
                    loadMessages();
                }
            } catch (err) {
                console.error("Error sending message:", err);
            }
        }

        function toggleChat() {
            const chat = document.getElementById('chat-container');
            const toggle = document.getElementById('chat-toggle');
            if (chat.style.display === 'none' || chat.style.display === '') {
                chat.style.display = 'flex';
                toggle.style.display = 'none';
            } else {
                chat.style.display = 'none';
                toggle.style.display = 'flex';
            }
        }

        // Toggle chat visibility if needed
        // For now it's always visible on this page

        // Initial load
        window.onload = () => {
            loadPlan();
            loadMessages();
            // Poll for new messages every 5 seconds
            setInterval(loadMessages, 5000);
        };

        // Enter key for chat
        document.getElementById('chat-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>

</html>
