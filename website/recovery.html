<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Recovery Plan | QuantiFlex</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .exercise-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
            border: 1px solid #e1e8ed;
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .exercise-thumb {
            width: 150px;
            height: 150px;
            flex-shrink: 0;
            border-radius: 8px;
            overflow: hidden;
            background: linear-gradient(135deg, #edf2f7, #dce8f3);
        }

        .exercise-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .exercise-thumb-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 2.4rem;
            color: #4d82ad;
        }

        .exercise-thumb-fallback small {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #7aa8c9;
        }

        .exercise-info {
            flex: 1;
        }

        .exercise-info h3 {
            color: #4d82ad;
            margin-top: 0;
            margin-bottom: 10px;
        }

        .exercise-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 12px;
            font-weight: bold;
            color: #2c3e50;
            font-size: 0.9rem;
        }

        .exercise-directions {
            margin-bottom: 12px;
            font-size: 0.93rem;
            color: #444;
            line-height: 1.65;
        }

        .exercise-directions strong {
            display: block;
            color: #2c3e50;
            margin-bottom: 4px;
        }

        .exercise-directions p {
            margin: 0;
        }

        .exercise-tips {
            background: #fff9db;
            padding: 10px 15px;
            border-left: 4px solid #fcc419;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #495057;
        }

        .exercise-video {
            margin-top: 14px;
        }

        .exercise-video .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .exercise-video .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            border-radius: 8px;
        }

        .exercise-video label {
            display: block;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        /* Chat component styles */
        #chat-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 350px;
            height: 450px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            display: none;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e1e8ed;
            z-index: 1000;
        }

        #chat-header {
            background: #4d82ad;
            color: white;
            padding: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
        }

        .message {
            margin-bottom: 12px;
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.4;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            animation: fadeIn 0.3s ease;
        }

        .message.patient {
            background: #4d82ad;
            color: white;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 2px;
        }

        .message.clinician {
            background: #ffffff;
            color: #333;
            align-self: flex-start;
            border: 1px solid #cbd5e1;
            border-bottom-left-radius: 2px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #chat-toggle {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            background: #4d82ad;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            z-index: 1001;
            font-size: 1.8rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #chat-toggle:hover {
            transform: scale(1.1) rotate(5deg);
        }

        #chat-input-area {
            padding: 15px;
            border-top: 1px solid #e1e8ed;
            display: flex;
            gap: 10px;
        }

        #chat-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            outline: none;
            font-family: inherit;
        }

        #send-btn {
            background: #4d82ad;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
        }

        @media (max-width: 768px) {
            .exercise-card {
                flex-direction: column;
            }

            .exercise-thumb {
                width: 100%;
                height: 200px;
            }

            #chat-container {
                width: 90%;
                left: 5%;
                right: 5%;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>QuantiFlex</h1>
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="analysis.html">My Progress</a></li>
                <li><a href="recovery.html" class="active">Recovery Plan</a></li>
            </ul>
        </nav>
    </header>

    <main style="max-width: 1000px; margin: 0 auto; padding: 40px 20px;">
        <h2 style="text-align: center; margin-bottom: 40px; color: #2c3e50;">Active Rehabilitation Plan</h2>

        <div id="exercises-container">
            <p style="text-align: center; color: #666;">Loading your exercises...</p>
        </div>

        <!-- Chat Toggle -->
        <div id="chat-toggle" onclick="toggleChat()">
            <span>💬</span>
        </div>

        <!-- Chat Box -->
        <div id="chat-container">
            <div id="chat-header">
                Chat with Clinician
                <span style="font-size: 1.2rem; cursor: pointer;" onclick="toggleChat()">×</span>
            </div>
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type a message...">
                <button id="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2025-2026 Quantiflex | Clinical Rehabilitation Technology</p>
    </footer>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:5001';
        const PATIENT_ID = 'p101';

        // Knee Rehabilitation Exercises ────────────────────────
        const FALLBACK_EXERCISES = [
            {
                name: 'Quad Sets',
                sets: 3, reps: 10,
                frequency: '3–4 times/day',
                directions: 'Sit or lie on your back with your leg straight on a flat surface. Tighten the muscle on top of your thigh (quadriceps) by pressing the back of your knee down into the floor or bed. Hold for 5 seconds, then relax completely.',
                tips: 'Breathe normally throughout. You should feel the muscle firm up but not feel pain. This can be done throughout the day while resting.',
                image: 'exercises/quad-sets.jpg',
                video: 'https://www.youtube.com/watch?v=9EhHFemc8WQ'
            },
            {
                name: 'Straight Leg Raises',
                sets: 3, reps: 10,
                frequency: '3 times/day',
                directions: 'Lie on your back. Bend the uninvolved knee with your foot flat on the floor. Tighten your quad on the involved leg (perform a quad set), then lift the straight leg to the height of the opposite bent knee — about 12 inches. Hold for 3 seconds, then slowly lower.',
                tips: 'Keep your knee completely straight throughout the entire lift and lowering phase. Do not let it bend.',
                image: 'exercises/straight-leg-raises.jpg',
                video: 'https://www.youtube.com/watch?v=4UBnTSqRlD0'
            },
            {
                name: 'Heel Slides',
                sets: 3, reps: 10,
                frequency: '3 times/day',
                directions: 'Lie on your back with both legs straight. Slowly slide your heel toward your buttock by bending the knee as far as comfortable. Hold for 5 seconds, then slowly slide back to the starting position.',
                tips: 'Keep your heel in contact with the surface at all times. Do not force the bend — work within a comfortable range and aim to increase it gradually each session.',
                image: 'exercises/heel-slides.jpg',
                video: 'https://www.youtube.com/watch?v=dPf8_MgS1aI'
            },
            {
                name: 'Short Arc Quads',
                sets: 3, reps: 10,
                frequency: '3 times/day',
                directions: 'Lie on your back. Place a rolled towel or firm bolster under your knee so it rests at approximately 60°. Tighten your quad and slowly lift your foot until the leg is fully straight. Hold for 5 seconds, then slowly lower.',
                tips: 'Keep your thigh resting on the bolster at all times — do not lift the thigh. Focus on achieving full, terminal knee extension at the top.',
                image: 'exercises/short-arc-quads.jpg',
                video: 'https://www.youtube.com/watch?v=3f1k1huhRgI'
            },
            {
                name: 'Ankle Pumps',
                sets: 3, reps: 20,
                frequency: '3–4 times/day',
                directions: 'Lie or sit with your leg straight. Slowly pull your toes up toward your shin as far as possible (dorsiflexion), hold 2 seconds, then point your toes downward (plantarflexion), hold 2 seconds. Alternate in a slow, rhythmic pattern.',
                tips: 'This exercise promotes circulation and helps reduce swelling. Perform it frequently — especially during the first several weeks after surgery or injury.',
                image: 'exercises/ankle-pumps.jpg',
                video: 'https://www.youtube.com/watch?v=O92TCCmEqbk'
            },
            {
                name: 'Prone Knee Flexion',
                sets: 3, reps: 10,
                frequency: '3 times/day',
                directions: 'Lie face down on a flat surface with your legs straight. Slowly bend your involved knee, bringing your heel toward your buttock as far as comfortable. Hold for 3 seconds, then slowly lower back to the starting position.',
                tips: 'Keep your hip flat against the surface throughout — do not allow it to rise as you bend the knee.',
                image: 'exercises/prone-knee-flexion.jpg',
                video: 'https://www.youtube.com/watch?v=_LP6X9J68H0'
            },
            {
                name: 'Terminal Knee Extension',
                sets: 3, reps: 15,
                frequency: '3 times/day',
                directions: 'Secure a resistance band to a fixed anchor at knee height. Loop the other end around the back of your involved knee. Face the anchor and start with the knee slightly bent. Tighten your quad and fully straighten the knee. Hold 2 seconds, then slowly return.',
                tips: 'Stand tall with your core engaged. Control the return movement — do not let the band snap your knee back into flexion.',
                image: 'exercises/terminal-knee-extension.jpg',
                video: 'https://www.youtube.com/watch?v=uUugNQxirt0'
            },
            {
                name: 'Standing Hip Abduction',
                sets: 3, reps: 10,
                frequency: '3 times/day',
                directions: 'Stand beside a wall or counter and hold it lightly for balance. Slowly lift your involved leg straight out to the side, keeping your toes pointing forward and your knee straight. Hold for 3 seconds, then slowly lower.',
                tips: 'Do not lean your trunk toward the standing leg. Keep your back straight and movements slow and controlled.',
                image: 'exercises/hip-abduction.jpg',
                video: 'https://www.youtube.com/watch?v=xUxWsvWj3Go'

            },
            {
                name: 'Heel Raises',
                sets: 3, reps: 10,
                frequency: '3 times/day',
                directions: 'Stand with feet hip-width apart, lightly holding a stable surface for balance. Rise up onto the balls of both feet as high as comfortable. Hold for 3 seconds, then slowly lower your heels back to the floor.',
                tips: 'Control the lowering phase — this eccentric portion builds significant calf strength. As you progress, your therapist may advance you to single-leg heel raises.',
                image: 'exercises/heel-raises.jpg',
                video: 'https://www.youtube.com/watch?v=cqDMYUaIXvw'
            },
            {
                name: 'Wall Squats',
                sets: 3, reps: 10,
                frequency: '3 times/week',
                directions: 'Stand with your back flat against a wall, feet shoulder-width apart and placed about 12 inches in front of the wall. Slowly slide down until your knees are bent at 45–60°. Hold for 5–10 seconds, then slide back up to standing.',
                tips: 'Do not allow your knees to bend past 90°. Keep knees aligned over your second toes and do not let them cave inward.',
                image: 'exercises/wall-squats.jpg',
                video: 'https://www.youtube.com/watch?v=3J99J5NxNSQ'
            },
            {
                name: 'Step-Ups',
                sets: 3, reps: 10,
                frequency: '3 times/week',
                directions: 'Stand in front of a 4–6 inch step. Step up with the involved leg and place your whole foot on the step. Bring the other foot up, then step back down with the uninvolved leg first. The involved leg should do the majority of the work.',
                tips: 'Keep your knee tracking over your second toe during the step. Use a handrail for balance if needed, especially early in rehabilitation.',
                image: 'exercises/step-ups.jpg',
                video: 'https://www.youtube.com/watch?v=xOcpKS8APxo'
            },
            {
                name: 'Hamstring Curls (Standing)',
                sets: 3, reps: 10,
                frequency: '3 times/week',
                directions: 'Stand holding a wall or counter for support. Slowly bend your involved knee, curling your heel toward your buttock as far as comfortable. Hold for 3 seconds, then slowly lower your foot back to the floor.',
                tips: 'Keep both thighs even and parallel — do not let the involved hip hike up as you curl. Increase range of motion gradually.',
                image: 'exercises/hamstring-curls.jpg',
                video: 'https://www.youtube.com/watch?v=zRL2TBKc2cc'
            }
        ];

        // ── Helpers ───────────────────────────────────────────────────────────
        function getYouTubeEmbedUrl(url) {
            if (!url) return null;
            let id = null;
            try {
                const u = new URL(url);
                if (u.hostname.includes('youtu.be')) {
                    id = u.pathname.slice(1);
                } else if (u.hostname.includes('youtube.com')) {
                    id = u.searchParams.get('v');
                }
            } catch (e) { return null; }
            return id ? `https://www.youtube.com/embed/${id}` : null;
        }

        // ── Exercise Rendering ───────────────────────────────────────────────
        function renderExercises(exercises) {
            const container = document.getElementById('exercises-container');

            if (!exercises || exercises.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#666;">No exercises assigned yet. Check back after your next appointment.</p>';
                return;
            }

            container.innerHTML = exercises.map((ex, i) => {
                const embedUrl = getYouTubeEmbedUrl(ex.video);
                return `
                <div class="exercise-card">
                    <div class="exercise-thumb">
                        <img src="${ex.image || ''}"
                             alt="${ex.name}"
                             onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                        <div class="exercise-thumb-fallback" style="display:none;">
                            <span>🏋️</span>
                            <small>${ex.name.split(' ').map(w => w[0]).join('').slice(0, 3)}</small>
                        </div>
                    </div>
                    <div class="exercise-info">
                        <h3>${ex.name}</h3>
                        <div class="exercise-meta">
                            <span>📋 ${ex.sets} sets × ${ex.reps} reps</span>
                            <span>🔁 ${ex.frequency}</span>
                        </div>
                        ${ex.directions ? `
                        <div class="exercise-directions">
                            <strong>Instructions:</strong>
                            <p>${ex.directions}</p>
                        </div>` : ''}
                        ${ex.tips ? `
                        <div class="exercise-tips">
                            <strong>💡 Tip:</strong> ${ex.tips}
                        </div>` : ''}
                        ${embedUrl ? `
                        <div class="exercise-video">
                            <label>▶ Video Demo</label>
                            <div class="video-wrapper">
                                <iframe src="${embedUrl}"
                                    title="${ex.name} demo"
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                    allowfullscreen></iframe>
                            </div>
                        </div>` : ''}
                    </div>
                </div>
            `}).join('');
        }

        // ── Plan Loading ─────────────────────────────────────────────────────
        async function loadPlan() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/assignments/${PATIENT_ID}`);
                const data = await response.json();
                const exercises = data.exercises || [];
                renderExercises(exercises.length > 0 ? exercises : FALLBACK_EXERCISES);
            } catch (err) {
                console.warn('Backend unavailable, showing sample exercises:', err.message);
                renderExercises(FALLBACK_EXERCISES);
            }
        }

        // ── Chat ─────────────────────────────────────────────────────────────
        function toggleChat() {
            const container = document.getElementById('chat-container');
            const toggle = document.getElementById('chat-toggle');
            const isOpen = container.style.display === 'flex';
            container.style.display = isOpen ? 'none' : 'flex';
            toggle.style.display = isOpen ? 'flex' : 'none';
            if (!isOpen) loadMessages();
        }

        async function loadMessages() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/messages/${PATIENT_ID}`);
                const data = await response.json();
                displayMessages(data.messages || []);
            } catch (err) {
                console.warn('Could not load messages:', err.message);
            }
        }

        function displayMessages(messages) {
            const container = document.getElementById('chat-messages');
            if (messages.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#aaa;font-size:0.85rem;padding:10px 0;">No messages yet.</p>';
                return;
            }
            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.role === 'patient' ? 'patient' : 'clinician'}">
                    ${msg.text}
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';

            const container = document.getElementById('chat-messages');
            const msgEl = document.createElement('div');
            msgEl.className = 'message patient';
            msgEl.textContent = text;
            container.appendChild(msgEl);
            container.scrollTop = container.scrollHeight;

            try {
                await fetch(`${API_BASE_URL}/api/messages/${PATIENT_ID}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, role: 'patient' })
                });
            } catch (err) {
                console.warn('Could not send message:', err.message);
            }
        }

        // Enter key to send
        document.getElementById('chat-input').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });

        document.addEventListener('DOMContentLoaded', loadPlan);
    </script>
</body>

</html>
