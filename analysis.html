<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UTBiome Knee Sleeve - Data Analysis</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <header>
        <h1>UTBiome Knee Sleeve</h1>
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="analysis.html" class="active">Analysis</a></li>
                <li><a href="video.html">Video Demo</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="analysis-hero">
            <h2>Patient Progress Analytics</h2>
            <p>Comprehensive data visualization for informed clinical decisions</p>
        </section>

        <section class="controls">
            <button id="startBtn" class="btn-start">Start Tracking</button>
            <button id="stopBtn" class="btn-stop" disabled>Stop Tracking</button>
            <span id="statusIndicator" class="status-offline">System Idle</span>
        </section>
        
        <section class="charts-section">
            <div class="chart-container">
                <h3>Range of Motion Progress</h3>
                <canvas id="romChart"></canvas>
            </div>
        </section>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // --- UI Elements ---
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const status = document.getElementById('statusIndicator');
            const liveValDisplay = document.getElementById('liveValue');
            const romCtx = document.getElementById('romChart').getContext('2d');

            // --- App State ---
            let isTracking = false;
            let dataFetchInterval = null;
            const ESP_IP = "http://192.168.4.1";

            // --- Chart Setup ---
            const romChart = new Chart(romCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Live EMG',
                        data: [],
                        borderColor: '#4d82ad',
                        backgroundColor: 'rgba(77, 130, 173, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    animation: false,
                    scales: { y: { beginAtZero: true, max: 4095 } }
                }
            });

            // --- Communication Functions ---
            
            // Syncs hardware state (Start/Stop)
            async function setHardwareState(state) {
                try {
                    await fetch(`${ESP_IP}/toggle?state=${state}`, { mode: 'no-cors' });
                    console.log(`Hardware state set to: ${state}`);
                } catch (err) {
                    console.error("Hardware sync failed:", err);
                }
            }

            // Fetches data point
            function updateData() {
                fetch(`${ESP_IP}/data`)
                    .then(response => response.text())
                    .then(value => {
                        if (value === "OFF") return; // Ignore if hardware is in standby

                        const numericValue = parseInt(value);
                        if (isNaN(numericValue)) return;

                        const now = new Date().toLocaleTimeString();

                        // Update Chart
                        romChart.data.labels.push(now);
                        romChart.data.datasets[0].data.push(numericValue);
                        liveValDisplay.textContent = numericValue;

                        if (romChart.data.labels.length > 20) {
                            romChart.data.labels.shift();
                            romChart.data.datasets[0].data.shift();
                        }
                        romChart.update();
                    })
                    .catch(err => console.warn("Waiting for ESP32..."));
            }

            // --- Button Logic ---

            startBtn.onclick = async function() {
                status.textContent = "Syncing Hardware...";
                await setHardwareState('start');
                
                isTracking = true;
                startBtn.disabled = true;
                stopBtn.disabled = false;
                status.textContent = "Live Tracking...";
                status.className = "status-online";
                
                dataFetchInterval = setInterval(updateData, 200);
            };

            stopBtn.onclick = async function() {
                await setHardwareState('stop');
                
                isTracking = false;
                startBtn.disabled = false;
                stopBtn.disabled = true;
                status.textContent = "System Idle";
                status.className = "status-offline";
                
                clearInterval(dataFetchInterval);
            };
        });
    </script>
</body>
</html>
